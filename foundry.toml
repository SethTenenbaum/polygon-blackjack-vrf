[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

# Exclude archived libraries and tests from compilation
exclude = ["src/archive/*", "src/libraries/archive/*", "test/archive/*"]

# Exclude TestableGame from fuzz/invariant testing since it's a helper contract
[fuzz]
exclude_contracts = ["TestableGame"]

[invariant]
exclude_contracts = ["TestableGame"]

[rpc_endpoints]
amoy = "https://rpc-amoy.polygon.technology/"

[etherscan]
amoy = { key = "${POLYGONSCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
